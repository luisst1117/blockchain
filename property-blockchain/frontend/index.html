<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Property Registry DApp</title>

  <style>
    :root {
      --primary: #1e3a8a;
      --secondary: #2563eb;
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --success: #16a34a;
      --danger: #dc2626;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      padding: 24px 40px;
    }

    header h1 {
      margin: 0;
      font-size: 26px;
      font-weight: 600;
    }

    header p {
      margin: 6px 0 0;
      opacity: 0.9;
    }

    main {
      max-width: 1100px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .account {
      font-size: 14px;
      color: var(--muted);
    }

    button {
      background: var(--secondary);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px 18px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }

    button:hover {
      background: var(--primary);
    }

    button.secondary {
      background: #e5e7eb;
      color: #111827;
    }

    button.secondary:hover {
      background: #d1d5db;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--card);
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.06);
    }

    .card h3 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 18px;
    }

    label {
      font-size: 13px;
      color: var(--muted);
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      margin-bottom: 12px;
      border-radius: 6px;
      border: 1px solid #cbd5f5;
      font-size: 14px;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
    }

    .success { color: var(--success); }
    .error { color: var(--danger); }

    .hidden {
      display: none;
    }

    hr {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 30px 0;
    }

    .property-card {
      background: #f8fafc;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 10px;
      font-size: 14px;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>

<body>

<header>
  <h1>Sistema Descentralizado de Registro Inmobiliario</h1>
  <p>Registro y trazabilidad de inmuebles en Blockchain</p>
</header>

<main>

  <div class="top-bar">
    <button id="connect">Conectar MetaMask</button>
    <div id="account" class="account">No conectado</div>
  </div>

  <div id="ownerStatus" class="card hidden"></div>

  <div class="grid">

    <!-- REGISTRAR -->
    <div id="registerSection" class="card hidden">
      <h3>Registrar Propiedad</h3>

      <label>Dirección del inmueble</label>
      <input id="direccion" placeholder="Ej: Calle 123 #45-67" />

      <label>Tipo</label>
      <input id="tipo" placeholder="Casa, Apartamento, Lote" />

      <label>Área (m²)</label>
      <input id="area" placeholder="Ej: 120" />

      <button id="registerBtn">Registrar en Blockchain</button>
      <div id="registerStatus" class="status"></div>
    </div>

    <!-- VALIDAR -->
    <div id="validateSection" class="card hidden">
      <h3>Validar Propiedad</h3>

      <label>ID de la propiedad</label>
      <input id="validateId" type="number" placeholder="Ej: 1" />

      <button id="validateBtn">Validar</button>
      <div id="validateStatus" class="status"></div>
    </div>

    <!-- TRANSFERIR -->
    <div id="transferSection" class="card hidden">
      <h3>Transferir Propiedad</h3>

      <label>ID de la propiedad</label>
      <input id="transferId" type="number" placeholder="Ej: 1" />

      <label>Dirección destino</label>
      <input id="transferTo" placeholder="0x..." />

      <button id="transferBtn">Transferir</button>
      <div id="transferStatus" class="status"></div>
    </div>

  </div>

  <hr>

  <!-- LISTAR -->
  <div class="card">
    <h3>📋 Consultar Propiedades</h3>

    <label>Último ID registrado</label>
    <input id="maxId" type="number" placeholder="Ej: 5" />

    <button id="loadProperties" class="secondary">Cargar propiedades</button>

    <div id="properties" style="margin-top:15px;"></div>
  </div>

</main>

<footer>
  © 2026 · Proyecto académico · Blockchain + IPFS
</footer>

<!-- Ethers -->
<script src="https://cdn.jsdelivr.net/npm/ethers@6.12.1/dist/ethers.umd.min.js"></script>
<script src="app.js"></script>

</body>
</html>
